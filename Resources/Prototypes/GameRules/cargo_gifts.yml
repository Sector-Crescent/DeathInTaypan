# Tables --  Add your new event to this Table if you want it to happen via the basic/ramping schedulers.

- type: entityTable
  id: CargoGiftsTable
  table: !type:GroupSelector # ~~we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp~~ But we arent doing that shit yet, it picks a random one StationEventComp be damned.
    children:
    - id: GiftsEngineering
    - id: GiftsPearcat
# Game Rules

- type: entity
  id: CargoGiftsBase
  parent: BaseGameRule
  abstract: true
  components:
  - type: GameRule
    delay:
      min: 10
      max: 10
  - type: StationEvent
    startColor: "#18abf5"
  - type: CargoGiftsRule
    sender: cargo-gift-default-sender

- type: entity
  id: GiftsEngineering
  parent: CargoGiftsBase
  components:
  - type: StationEvent
    weight: 5
    duration: 240
    earliestStart: 30
    minimumPlayers: 10
  - type: CargoGiftsRule
    description: cargo-gift-eng
    dest: cargo-gift-dest-eng
    gifts:
      MaterialSteel: 1
      MaterialPlasteel: 1
      MaterialGlass: 1

- type: entity
  id: GiftsPearcat
  parent: CargoGiftsBase
  components:
  - type: StationEvent
    weight: 5
    duration: 120
    earliestStart: 20
  - type: CargoGiftsRule
    description: cargo-gift-pizza-small
    dest: cargo-gift-dest-bar
    gifts:
      CratePlushiePearcat: 40              # 40 pearcats
