- type: trait
  id: SignLanguage
  category: TraitsSpeechLanguages
  points: -1
  requirements:
    # - !type:CharacterItemGroupRequirement
    #   group: TraitsLanguagesBasic
    #- !type:CharacterTraitRequirement
    #  inverted: true
    #  traits:
    #    - Muted
    - !type:CharacterSpeciesRequirement
      inverted: true
      species:
        - Human
  functions:
    - !type:TraitModifyLanguages
      languagesSpoken:
        - Sign
      languagesUnderstood:
        - Sign

- type: trait
  id: Tradeband
  category: TraitsSpeechLanguages
  points: -2
  functions:
    - !type:TraitModifyLanguages
      languagesSpoken:
        - Tradeband
      languagesUnderstood:
        - Tradeband


- type: trait
  id: ForeignerLight
  category: TraitsSpeechLanguages
  points: 2
  requirements:
  - !type:CharacterTraitRequirement
    inverted: true
    traits:
    - Foreigner
    - Muted
  - !type:CharacterJobRequirement
    inverted: true
    jobs:
    - Mime
  functions:
  - !type:TraitAddComponent
    components:
    - type: ForeignerTrait
      cantUnderstand: false
      baseTranslator: TranslatorForeigner

- type: trait
  id: Foreigner
  category: TraitsSpeechLanguages
  points: 4
  requirements: # TODO: Add a requirement to know at least 1 non-gc language
  - !type:CharacterTraitRequirement
    inverted: true
    traits:
    - ForeignerLight
    - Muted
  - !type:CharacterJobRequirement
    inverted: true
    jobs:
    - Mime
  functions:
  - !type:TraitAddComponent
    components:
    - type: ForeignerTrait
      baseTranslator: TranslatorForeigner
