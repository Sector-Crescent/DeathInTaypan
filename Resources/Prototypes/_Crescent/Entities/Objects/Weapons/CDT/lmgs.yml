- type: entity
  name: CDT L60 7.62x51mm
  parent: BaseWeaponRifle
  id: CrescentWeaponLMGL60
  description: l60 alcor top 10 tuff names
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/LMG/L60.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/LMG/L60.rsi
  - type: Gun
    fireRate: 6
    soundGunshot:
      collection: Lmg_1_Gunshots
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentBoxMagazine_762x51
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentBoxMagazine_762x51
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_762x51
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_762x51
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Crescent/Weapons/Guns/conscript/rack.ogg
    soundBoltOpened:
      path: /Audio/_Crescent/Weapons/Guns/conscript/bolt_open.ogg
    soundBoltClosed:
      path: /Audio/_Crescent/Weapons/Guns/conscript/bolt_close.ogg
