- type: entity
  name: CDT C-2001 5.56x45mm
  parent: BaseWeaponRifle
  id: CrescentWeaponRifleTypeC2001
  description: The C-2001 is Cyberdawn Technology's anwser to the Type-518, and is one of their best sellers as of yet. A simple core, with an enormously overengineered polymer frame wrapped around it, the C-2001 was designed with ergonomics above all else, and it shows. Sporting a slightly lower firerate to stop the polymer from melting, the C-2001 is a solid rifle, if you can afford the steep cost.
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/C-2001.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/C-2001.rsi
  - type: Gun
    fireRate: 6
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    shotsPerBurst: 2
    burstFireRate: 10
    burstCooldown: 0.5
    soundGunshot:
      collection: M16_Gunshots
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_556x45
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_556x45
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_556x45
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_556x45
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000
