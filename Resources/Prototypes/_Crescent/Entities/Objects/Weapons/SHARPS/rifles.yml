
# The actual rifles

- type: entity
  name: Sharps AX-5 5.56x45mm
  parent: BaseWeaponRifle
  id: CrescentWeaponRifleTypeAX5
  description: The AX-5 is Sharps Precision's main assault rifle, and one of their oldest selling firearms. Being their first commercial product, the AX-5 is designed to be simple, yet reliable. Coming with a short barrel rather than a bullpup congifuration, the AX-5 does suffer in velocity slightly, but the integrated suppressor more than makes up for it.
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/AX-5.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/AX-5.rsi
  - type: Gun
    fireRate: 6.5
    selectedMode: FullAuto
    availableModes:
      - FullAuto
      - Burst
    shotsPerBurst: 2
    burstFireRate: 10
    burstCooldown: 0.5
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/supressed_1/supressed_gunshot_3.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_556x45
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_556x45
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_556x45
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_556x45
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000


