- type: entity
  name: Sharps PAA-13c 12ga
  parent: [BaseWeaponShotgun, BaseGunWieldable]
  id: CrescentWeaponShotgunPAA13c
  description: placeholder
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/PAA-13C.rsi
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/PAA-13C.rsi
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/PAA-13C.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: GunRequiresWield
  - type: Gun
    damageModifier: 1.25
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: Shotgun_1_Gunshots
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    fireOnDropChance: 0.3
    shotgunSpreadMultiplier: 1.25
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - CrescentCartridge_12Ga
    capacity: 8
    autoCycle: true
    proto: CrescentCartridge_12Ga
  - type: Wieldable
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: Execution
  - type: MeleeWeapon
    attackRate: 1.4
    damage:
      types:
        Blunt: 10
    bluntStaminaDamageFactor: 1.3333
    swapKeys: true
    disableHeavy: true
    animation: WeaponArcThrust
    wideAnimationRotation: 180
    soundHit:
      collection: MetalThud
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 2.5
  - type: DamageOtherOnHit
    staminaCost: 9.5

