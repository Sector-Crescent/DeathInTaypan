
# The actual rifles
- type: entity
  name: NCWL SV-79 7.62x39mm
  parent: BaseWeaponRifle
  id: CrescentWeaponRifleSV79
  description: A unique bullpup design, produced by the Union Foundry in Chengridz. Designed with CQB in mind, the bullpup configuration allows for a long barrel in a stout package, at the cost of complicating the internal machinery.
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/SV-79.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/SV-79.rsi
  - type: Gun
    fireRate: 6.5
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/rifle_2/rifle_gunshot_2.ogg
  - type: ChamberMagazineAmmoProvider
    boltClosed: null # means the bolt doesnt lock back like M16 pattern rifles, also means you need to cycle the gun after an empty mag
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_762x39
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_762x39
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_762x39
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_762x39
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000

- type: entity
