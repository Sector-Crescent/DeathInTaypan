
- type: entity
  name: SHI TYPE-80 12ga
  parent: [BaseWeaponShotgun, BaseGunWieldable]
  id: CrescentWeaponShotgunType80
  description: The Type-80 is Shinohara's answer to the requests for a tactical, semi automatic, 12 guage shotgun. Cheap, effective, stable, the Type-80 does it all.
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/TYPE-80.rsi
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/TYPE-80.rsi
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/TYPE-80.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: GunRequiresWield
  - type: Gun
    damageModifier: 1.25
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/shotgun_1/shotgun_gunshot_3.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    fireOnDropChance: 0.3
    shotgunSpreadMultiplier: 1.25
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - CrescentCartridge_12Ga
    capacity: 8
    autoCycle: true
    proto: CrescentCartridge_12Ga
  - type: Wieldable
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: Execution
  - type: MeleeWeapon
    attackRate: 1.4
    damage:
      types:
        Blunt: 10
    bluntStaminaDamageFactor: 1.3333
    swapKeys: true
    disableHeavy: true
    animation: WeaponArcThrust
    wideAnimationRotation: 180
    soundHit:
      collection: MetalThud
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 2.5
  - type: DamageOtherOnHit
    staminaCost: 9.5

- type: entity
  name: SHI SH-90-S 12ga
  parent: [BaseWeaponSubMachineGun ]
  id: CrescentWeaponShotgunSH90S
  description: placeholder
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/SH-90-S.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SHOTGUN/SH-90-S.rsi
    slots:
    - Back
    - suitStorage
  - type: ChamberMagazineAmmoProvider
    boltClosed: null
  - type: Gun
    soundGunshot:
      collection: Shotgun_1_Gunshots
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    fireRate: 2
    angleIncrease: 5
    angleDecay: 10
    maxAngle: 10
    minAngle: 1
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    fireOnDropChance: 0.1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_12Ga
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_12Ga
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_12Ga
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_12Ga
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

