
- type: entity
  name: SHI SR-200 .376mm
  parent: [BaseWeaponRifle]
  id: CrescentWeaponSniperSR200
  description: placeholder
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SNIPERS/SR-200.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SNIPERS/SR-200.rsi
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/non_collection/amr.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_376
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_376
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_376
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_376
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000

