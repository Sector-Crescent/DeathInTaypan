- type: entity
  name: OLCRES PKM 7.62x54mm
  parent: BaseWeaponRifle
  id: CrescentWeaponLMGPKM
  description: dude its just all lord of war references
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/LMG/PKM.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/LMG/PKM.rsi
  - type: Gun
    fireRate: 6
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/conscript/gunshot.ogg
    soundEmpty:
      path: /Audio/_Crescent/Weapons/Guns/conscript/empty.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Crescent/Weapons/Guns/conscript/rack.ogg
    soundBoltOpened:
      path: /Audio/_Crescent/Weapons/Guns/conscript/bolt_open.ogg
    soundBoltClosed:
      path: /Audio/_Crescent/Weapons/Guns/conscript/bolt_close.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentBoxMagazine_762x54
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentBoxMagazine_762x54
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_762x54
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_762x54
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000
