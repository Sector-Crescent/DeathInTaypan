- type: entity
  name: OLCRES PP-91
  parent: [BaseWeaponSubMachineGun]
  id: CrescentWeaponSubMachineGunPP91
  description: pp like penis
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SMG/PP-91.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SMG/PP-91.rsi
    slots:
    - Back
    - suitStorage
  - type: ChamberMagazineAmmoProvider
    boltClosed: null
  - type: Gun
    fireRate: 10
    angleIncrease: 5
    angleDecay: 20
    maxAngle: 20
    minAngle: 1
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    fireOnDropChance: 0.1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentSMGMagazine_9x18
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentSMGMagazine_9x18
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_9x18
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_9x18
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
