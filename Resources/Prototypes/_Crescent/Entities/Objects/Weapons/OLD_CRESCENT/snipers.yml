- type: entity
  name: OLCRES SVDS 7.62x54mm
  parent: BaseWeaponRifle
  id: CrescentWeaponSniperSVDS
  description: placeholder
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/SNIPERS/SVDS.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/SNIPERS/SVDS.rsi
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/non_collection/amr.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_762x54
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_762x54
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_762x54
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_762x54
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000
