  description: imperialslop
  components:
  - type: Item
    size: Ginormous
  - type: StaticPrice
    price: 2000
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/M919.rsi
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/M919.rsi
  - type: Gun
    fireRate: 3
    projectileSpeed: 45
    selectedMode: SemiAuto
    availableModes:
