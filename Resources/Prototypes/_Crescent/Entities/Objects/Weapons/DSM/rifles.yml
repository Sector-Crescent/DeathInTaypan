
- type: entity
  name: DSM IPV-701 5.56x45mm
  parent: BaseWeaponRifle
  id: CrescentWeaponRifleIPV701
  description: The standard issue rifle used by the Imperial Army and Imperial Marine Corps. Designed after a somewhat unpopular firearm used hundreds and hundreds of years ago, and overengineered to hell and back. Fires bullets like any other gun does, but looks great.
  components:
  - type: Item
    shape:
    - 0,0,4,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/IPV-701.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/RIFLE/IPV-701.rsi
  - type: Gun
    fireRate: 6.5
    soundGunshot:
      collection: Pistol_1_Gunshots
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CrescentMagazine_556x45
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - CrescentMagazine_556x45
      gun_chamber:
        name: Chamber
        startingItem: CrescentCartridge_556x45
        priority: 1
        whitelist:
          tags:
            - CrescentCartridge_556x45
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000

