- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitIndependentsEVA
  name: spacionaut softsuit
  description: A basic softsuit made by independents for spacers. Easily torn.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/Independents/OuterClothing/spacionaut.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/Independents/OuterClothing/spacionaut.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Heat: 0.65
        Cold: 0.65
        Caustic: 0.65
        Radiation: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitIndependentsEVA
  - type: StaticPrice
    price: 750

